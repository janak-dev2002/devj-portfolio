name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  BACKEND_IMAGE: ghcr.io/janak-dev2002/devj-portfolio-backend
  FRONTEND_IMAGE: ghcr.io/janak-dev2002/devj-portfolio-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is auto-provided on every run and already has the
      # packages:write permission declared above — no manually-created PAT
      # needed for CI to push images. (A separate PAT is still needed
      # server-side for the production host to *pull* private GHCR images —
      # that's devops/ansible's ghcr_token vault var, an unrelated concern.)
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The multi-stage backend/Dockerfile does the actual `mvnw package` build
      # inside the image — no separate Java setup step needed on the runner.
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is auto-provided on every run and already has the
      # packages:write permission declared above — no manually-created PAT
      # needed for CI to push images. (A separate PAT is still needed
      # server-side for the production host to *pull* private GHCR images —
      # that's devops/ansible's ghcr_token vault var, an unrelated concern.)
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build context is the repo root (frontend/Dockerfile also needs
      # devops/nginx/conf.d/default.conf). The multi-stage Dockerfile runs
      # `npm ci && npm run build` internally — no separate Node setup step.
      # VITE_API_URL is deliberately left unset: production is same-origin,
      # so the frontend must use relative /api/* URLs, not a baked-in host.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust the production server's host key
        env:
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      # Ship any docker-compose.yml changes on every deploy. The .env file
      # (DB/AWS application secrets) lives only on the server — it is set up
      # once (Ansible or by hand) and is never generated or touched by CI.
      # This keeps production credentials out of GitHub Actions entirely;
      # the pipeline only ever needs SSH + GHCR-push access.
      - name: Upload docker-compose.yml
        env:
          SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
        run: |
          scp docker-compose.yml \
            "$SERVER_USER@$SERVER_HOST:/opt/devj-portfolio/docker-compose.yml"

      # proxy_net is pre-existing and shared with the sibling SMR project
      # (see architecture.md R-8/Appendix C) — this workflow only ever
      # verifies it, it must NEVER create it. Creating it belongs to the
      # one-time Ansible provisioning step, not a routine deploy, so that a
      # typo'd network name or a re-run here can't silently produce a second,
      # disconnected "proxy_net" that this project joins while the shared
      # proxy still talks to the original one.
      #
      # devops/nginx/production/devj-portfolio.conf (the shared proxy's own
      # site config) is intentionally NOT deployed by this workflow — see
      # devops-done.md "Rev 3 Addendum" for the reasoning. Deploy it with
      # `make deploy-proxy-conf`, run by a human, deliberately.
      - name: Pull new images and restart the stack
        env:
          SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
        run: |
          ssh "$SERVER_USER@$SERVER_HOST" '
            set -e
            if ! docker network inspect proxy_net >/dev/null 2>&1; then
              echo "proxy_net Docker network not found on the server." >&2
              echo "This workflow never creates it (shared with the SMR project) -- run the Ansible provisioning playbook first." >&2
              exit 1
            fi
            cd /opt/devj-portfolio
            docker compose pull
            docker compose up --detach --remove-orphans
          '
