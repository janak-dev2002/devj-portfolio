# devj-portfolio — shared reverse-proxy site config
#
# DEPLOY: copy this file to /opt/reverse-proxy/conf.d/devj-portfolio.conf on
# the production server, then reload the shared proxy to pick it up:
#   docker exec shared_nginx_proxy nginx -s reload
# (or `docker compose restart nginx-proxy` from /opt/reverse-proxy/)
#
# This file is NOT baked into any devj-portfolio image and is not deployed by
# this project's own CI/CD — it lives on the shared proxy stack, alongside
# other projects' site configs (e.g. pricedbsmr.conf). See the reverse-proxy
# stack's own docker-compose.yml (not part of this repo) for the container
# that loads it.
#
# Terminates TLS for devj.zoneforty5.tech (Certbot + Cloudflare Full Strict —
# same pattern as pricedbsmr.work). Routes /api/* to the Spring Boot backend
# and everything else to the static frontend container. Both containers join
# the shared `proxy_net` Docker network from devj-portfolio's own
# docker-compose.yml — this file reaches them by their Compose service names,
# "devj-backend" and "devj-frontend".

server {
    listen 80;
    server_name devj.zoneforty5.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name devj.zoneforty5.tech;

    # ── TLS — Certbot cert, DNS-01 via Cloudflare (see shared/architecture.md) ──
    ssl_certificate     /etc/letsencrypt/live/devj.zoneforty5.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devj.zoneforty5.tech/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Resolve upstream hostnames lazily (per-request), not once at nginx
    # startup. devj-backend/devj-frontend live in an independent Compose
    # project from this shared proxy, so there's no depends_on to guarantee
    # startup order — a literal hostname in proxy_pass gets resolved eagerly
    # at config-load time and crash-loops the whole proxy ("host not found in
    # upstream") if Docker's embedded DNS isn't populated at that exact
    # moment. 127.0.0.11 is Docker's embedded DNS server on any user-defined
    # bridge network (always this address, not project-specific).
    resolver 127.0.0.11 valid=30s;

    # ── security headers (sent on every response — API and static alike) ────
    # Set here, not in the frontend container, since this is the only nginx
    # that ever actually terminates the browser-facing HTTPS connection.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # style-src/font-src allow Google Fonts — src/index.css @imports JetBrains
    # Mono + Space Grotesk from fonts.googleapis.com. Tighten this (drop the
    # googleapis/gstatic allowances) if the frontend switches to self-hosted fonts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # ── Spring Boot API — /api/* routes ──────────────────────────────────────
    # No trailing path on proxy_pass: nginx forwards the original URI
    # unchanged, so "/api/contact" reaches the backend as "/api/contact"
    # (Spring's controllers are mapped under /api directly).
    location /api/ {
        set $upstream_backend devj-backend;
        proxy_pass         http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Real client IP, required by the backend's Bucket4j rate limiter
        # (Tomcat RemoteIpValve trusts this header only from internal Docker
        # IPs — api-contracts.md §7 / security-report.md FIND-001 fix).
        proxy_set_header   CF-Connecting-IP $http_cf_connecting_ip;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Actuator is intentionally not proxied — /actuator/health is for the
    # backend container's own Docker healthcheck only (api-contracts.md §2.5).

    # ── React frontend (static, from devj-frontend) — everything else ───────
    location / {
        set $upstream_frontend devj-frontend;
        proxy_pass         http://$upstream_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
