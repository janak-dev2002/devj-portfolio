# devj-portfolio — Nginx reverse proxy + static SPA host
#
# Serves the React build (dist/, baked into this image) at "/" and proxies
# "/api/*" to the Spring Boot backend. Sits behind Cloudflare Tunnel — TLS is
# terminated at the Cloudflare edge, this server only ever speaks plain HTTP
# on the internal Docker network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cloudflare Tunnel's health check / Docker Compose healthcheck target.
    # Kept separate from the SPA so it never depends on index.html or the API.
    location /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- security headers (sent on every response) ----
    # HSTS is honored by browsers over the HTTPS connection Cloudflare serves;
    # this origin itself is only ever reached via the Tunnel, never directly.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # style-src/font-src allow Google Fonts because src/index.css currently
    # @imports JetBrains Mono + Space Grotesk from fonts.googleapis.com — the
    # architecture doc's "self-host the font" note was not what got built.
    # Tighten this (drop the googleapis/gstatic allowances) if the frontend
    # switches to self-hosted font files.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # ---- gzip static assets ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ---- API reverse proxy ----
    # No trailing path on proxy_pass: nginx forwards the original URI
    # unchanged, so "/api/contact" reaches the backend as "/api/contact"
    # (Spring's controllers are mapped under /api directly).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        # Real client IP, required by the backend's Bucket4j rate limiter
        # (keyed on CF-Connecting-IP — see api-contracts.md §7 / R-6).
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Actuator is intentionally not proxied — /actuator/health is for the
    # backend container's own Docker healthcheck only (api-contracts.md §2.5).

    # ---- static assets: long cache, filenames are content-hashed by Vite ----
    # Deliberately `expires`, not `add_header Cache-Control`: a location's own
    # add_header discards ALL server-level add_header directives (nginx's
    # well-known non-merging inheritance rule) — that would silently drop
    # every security header above for every asset response. `expires` sets
    # Cache-Control without tripping that rule.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # ---- SPA fallback ----
    # index.html itself must always revalidate so a new deploy's hashed
    # asset references are picked up immediately. `expires -1` (not
    # `add_header Cache-Control: no-cache`) for the same reason as above.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
