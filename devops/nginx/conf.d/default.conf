# devj-portfolio — static SPA host (frontend image, "devj-frontend" service)
#
# Pure static file server now — no reverse-proxy logic here. This container
# is never reached directly (no host ports, unpublished on proxy_net); the
# shared reverse-proxy stack on the production server routes
# devj.zoneforty5.tech/* -> this container, and devj.zoneforty5.tech/api/* ->
# the backend container directly. See:
#   devops/nginx/production/devj-portfolio.conf   (the shared proxy's site config)
# Security headers, TLS, and CF-Connecting-IP forwarding all live in that file
# too — this container only ever sees plain internal HTTP.
#
# Archived home-server version (proxied /api/* itself): devops/nginx/home-server/default.conf

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker Compose healthcheck target for this container.
    location /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- gzip static assets ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ---- static assets: long cache, filenames are content-hashed by Vite ----
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # ---- SPA fallback ----
    # index.html itself must always revalidate so a new deploy's hashed
    # asset references are picked up immediately.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
