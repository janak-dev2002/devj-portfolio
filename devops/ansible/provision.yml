---
# Light-touch, idempotent provisioning for devj-portfolio on the shared
# production VPS. Rev 3 (2026-07-09): this server is NOT a fresh host — it
# already runs Docker for the sibling SMR Price Dashboard project. This
# playbook therefore does NOT install Docker and does NOT touch UFW/firewall
# rules; both are already correctly configured for the shared reverse-proxy
# by prior work this project has no business repeating or overriding. See
# shared/architecture.md Appendix C for the full rationale.
#
# Usage (from devops/ansible/):
#   cp inventory.ini.example inventory.ini            # fill in real host
#   cp group_vars/production/vault.yml.example group_vars/production/vault.yml
#   # fill in ghcr_username / ghcr_token, then:
#   ansible-vault encrypt group_vars/production/vault.yml
#   ansible-playbook provision.yml --ask-vault-pass
#
# NOT run against a real host by this agent — see
# shared/agent-handoffs/devops-done.md "Rev 3 Addendum". Ongoing deploys
# after this are GitHub Actions (SSH + `docker compose pull/up`), not
# repeated Ansible runs — this playbook is for first-time setup and drift
# reconciliation (safe to re-run any time, every task is idempotent or
# check-before-act).

- name: Provision devj-portfolio on the shared production server (light touch)
  hosts: production
  become: true

  vars:
    app_dir: /opt/devj-portfolio
    deploy_user: "{{ ansible_user }}"

  tasks:
    - name: Verify Docker is installed and the daemon is running
      ansible.builtin.command: docker info
      register: docker_info_check
      changed_when: false
      failed_when: false

    - name: Fail with a clear message if Docker is not available
      ansible.builtin.fail:
        msg: >-
          Docker daemon not reachable on this host. This playbook assumes
          Docker is already installed and running (the server hosts the SMR
          project's stack) and deliberately does not install it — see
          architecture.md Appendix C. If this really is an unprovisioned
          host, install Docker Engine manually first, then re-run.
      when: docker_info_check.rc != 0

    - name: Verify the shared proxy_net Docker network exists
      ansible.builtin.command: docker network inspect proxy_net
      register: proxy_net_check
      changed_when: false
      failed_when: false

    - name: Fail with a clear message if proxy_net does not exist
      ansible.builtin.fail:
        msg: >-
          proxy_net Docker network not found on this host. It is shared with
          the SMR project's reverse-proxy stack and this playbook
          deliberately never creates it (creating/recreating a network
          another live project depends on is exactly the kind of shared-infra
          risk architecture.md R-8 warns about). If this is genuinely a fresh
          host, create it once by hand — `docker network create proxy_net` —
          after confirming with whoever owns the SMR project, then re-run.
      when: proxy_net_check.rc != 0

    - name: Add deploy user to the docker group
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        groups: docker
        append: true
      # Needed so the GitHub Actions deploy step (which SSHes in as this
      # user and runs `docker compose` directly, no sudo) works regardless
      # of whether this happens to be the same OS user SMR's own deploy uses.

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0750"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0640"

    - name: Copy .env.example (the real .env is created manually on the host — never committed, never templated by Ansible)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../.env.example"
        dest: "{{ app_dir }}/.env.example"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0640"

    - name: Check for existing GHCR auth in the deploy user's Docker config
      ansible.builtin.stat:
        path: "/home/{{ deploy_user }}/.docker/config.json"
      register: docker_config_stat
      become_user: "{{ deploy_user }}"

    - name: Read the deploy user's Docker config if present
      ansible.builtin.slurp:
        path: "/home/{{ deploy_user }}/.docker/config.json"
      register: docker_config_raw
      when: docker_config_stat.stat.exists
      become_user: "{{ deploy_user }}"

    - name: Determine whether GHCR is already authenticated
      ansible.builtin.set_fact:
        ghcr_already_authenticated: >-
          {{ docker_config_stat.stat.exists and
             ('ghcr.io' in (docker_config_raw.content | b64decode)) }}

    # The server may already be logged in to GHCR for SMR's own private
    # images (same registry, possibly the same OS user) — verify before
    # assuming a fresh login is needed, per architecture.md Appendix C.
    - name: Log in to GHCR as the deploy user (skipped if already authenticated)
      become_user: "{{ deploy_user }}"
      ansible.builtin.command:
        cmd: docker login ghcr.io -u {{ ghcr_username }} --password-stdin
        stdin: "{{ ghcr_token }}"
      when: not ghcr_already_authenticated
      no_log: true
      changed_when: true

    - name: Install systemd unit for auto-start on reboot (optional — restart:unless-stopped already covers most cases)
      ansible.builtin.template:
        src: templates/devj-portfolio.service.j2
        dest: /etc/systemd/system/devj-portfolio.service
        mode: "0644"
      notify: reload systemd

    - name: Enable devj-portfolio systemd unit
      ansible.builtin.systemd:
        name: devj-portfolio.service
        enabled: true
        daemon_reload: true

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
