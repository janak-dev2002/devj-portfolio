# devj-portfolio — LOCAL DEV ONLY stack
#
# Just db + backend, with the backend port published to the host so it can be
# hit directly (curl/Postman/frontend dev server) without the full production
# stack (shared reverse proxy, external proxy_net, etc. — see docker-compose.yml).
# This exists so anyone on the team can get a working backend with one command
# instead of raw `docker run`:
#
#   docker compose -f docker-compose.dev.yml up --build
#
# Sensible defaults are baked in below so this runs with zero .env setup;
# create a .env next to this file to override any of them (e.g. real AWS
# creds if you want to test an actual SES send instead of a graceful 502).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devj_portfolio
      POSTGRES_USER: ${DB_USER:-devj_portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devj_portfolio}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devj_portfolio} -d devj_portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/devj_portfolio
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-devj_portfolio}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-devj_portfolio}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      RECIPIENT_EMAIL: ${RECIPIENT_EMAIL:-test@example.com}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  pgdata_dev:
